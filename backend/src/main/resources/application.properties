# ==============================
# OmniCrypt SecureVault Config
# ==============================

# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/omnicrypt_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:OmniCryptSecureVaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024}
app.jwt.expiration-ms=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.omnicrypt=DEBUG
logging.level.org.springframework.security=WARN
